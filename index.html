<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const BLUE = "#00AAFF";
const BLUE_DARK = "#0088DD";
const GRAY_50 = "#F7F8FA";
const GRAY_100 = "#F0F1F3";
const GRAY_200 = "#E2E4E8";
const GRAY_300 = "#C8CCD2";
const GRAY_500 = "#6B7280";
const GRAY_700 = "#374151";
const GRAY_900 = "#111827";
const GREEN = "#22C55E";

const PHONE_DISPLAY = "1-888-918-0455";
const PHONE_RAW = "18889180455";
const ZIP = "48167";
const CITY = "Northville";

function PhoneIcon({ size = 20, color = "currentColor" }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z" />
    </svg>
  );
}

function SendIcon() {
  return (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <line x1="22" y1="2" x2="11" y2="13" />
      <polygon points="22 2 15 22 11 13 2 9 22 2" />
    </svg>
  );
}

function StarIcon() {
  return (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="white" stroke="none">
      <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
    </svg>
  );
}

function ChevronRight() {
  return (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
      <polyline points="9 18 15 12 9 6" />
    </svg>
  );
}

function FilterIcon() {
  return (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={BLUE} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <line x1="4" y1="6" x2="20" y2="6" />
      <line x1="8" y1="12" x2="16" y2="12" />
      <line x1="11" y1="18" x2="13" y2="18" />
    </svg>
  );
}

function BoltIcon({ size = 18 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="#FACC15" stroke="#FACC15" strokeWidth="1">
      <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
    </svg>
  );
}

function TypingDots() {
  return (
    <div style={{ display: "flex", gap: 5, alignItems: "center", padding: "2px 0" }}>
      {[0, 1, 2].map(i => (
        <div key={i} style={{
          width: 7, height: 7, borderRadius: "50%", background: GRAY_300,
          animation: `tdBounce 1.2s ease-in-out ${i * 0.15}s infinite`,
        }} />
      ))}
    </div>
  );
}

function AgentDot() {
  return (
    <div style={{
      width: 32, height: 32, borderRadius: "50%", flexShrink: 0,
      background: `linear-gradient(135deg, ${BLUE}, ${BLUE_DARK})`,
      display: "flex", alignItems: "center", justifyContent: "center",
    }}>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" /><circle cx="12" cy="7" r="4" />
      </svg>
    </div>
  );
}

function CarrierCard({ name, logo, headline, bullets, starred }) {
  const [h, setH] = useState(false);
  return (
    <div onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
      style={{
        position: "relative", display: "flex", alignItems: "center", gap: 20,
        padding: "24px 28px", background: "white",
        border: `1px solid ${h ? BLUE : GRAY_200}`, borderRadius: 12, marginBottom: 16,
        transition: "border-color .15s, box-shadow .15s", cursor: "pointer",
        boxShadow: h ? "0 4px 20px rgba(0,170,255,0.08)" : "0 1px 4px rgba(0,0,0,0.04)",
      }}>
      {starred && (
        <div style={{
          position: "absolute", top: -1, left: -1, background: BLUE,
          borderRadius: "12px 0 8px 0", padding: "6px 8px", display: "flex", alignItems: "center",
        }}><StarIcon /></div>
      )}
      <div style={{ width: 150, minWidth: 150, display: "flex", alignItems: "center", justifyContent: "center" }}>
        {logo}
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <p style={{ color: BLUE, fontWeight: 700, fontSize: 16, margin: "0 0 8px", lineHeight: 1.3 }}>{headline}</p>
        <ul style={{ margin: 0, paddingLeft: 18, listStyle: "disc" }}>
          {bullets.map((b, i) => (
            <li key={i} style={{ fontSize: 13.5, color: GRAY_700, marginBottom: 3, lineHeight: 1.4 }}>{b}</li>
          ))}
        </ul>
      </div>
      <button style={{
        padding: "14px 32px", background: h ? BLUE_DARK : BLUE, color: "white", border: "none", borderRadius: 8,
        fontWeight: 700, fontSize: 16, cursor: "pointer", whiteSpace: "nowrap",
        display: "flex", alignItems: "center", gap: 4, transition: "background .15s",
      }}>See Rate <ChevronRight /></button>
    </div>
  );
}

function ProgressiveLogo() {
  return (<div style={{ textAlign: "center" }}>
    <div style={{ fontWeight: 900, fontSize: 22, color: "#004B8D", fontStyle: "italic", letterSpacing: -0.5, fontFamily: "Georgia, serif" }}>PROGRESSIVE</div>
  </div>);
}
function LibertyMutualLogo() {
  return (<div style={{ textAlign: "center" }}>
    <div style={{ fontWeight: 800, fontSize: 18, color: "#1A1A5E", lineHeight: 1.1, fontFamily: "Georgia, serif" }}>Liberty<br/>Mutual.</div>
    <div style={{ fontSize: 8, fontWeight: 600, color: "#B8860B", letterSpacing: 2, marginTop: 2 }}>INSURANCE</div>
  </div>);
}
function AllstateLogo() {
  return (<div style={{ textAlign: "center" }}>
    <div style={{ fontWeight: 800, fontSize: 20, color: "#003DA5", fontFamily: "Georgia, serif" }}>Allstate</div>
    <div style={{ fontSize: 9, color: GRAY_500, marginTop: 1 }}>You're in good hands.®</div>
  </div>);
}

function CityBanner() {
  return (
    <div style={{ position: "relative", background: "linear-gradient(180deg, #F0F9FF 0%, white 100%)", padding: "48px 0 24px", textAlign: "center", overflow: "hidden" }}>
      <svg width="100%" height="120" viewBox="0 0 1200 120" preserveAspectRatio="xMidYMax meet" style={{ position: "absolute", bottom: 0, left: 0, right: 0, opacity: 0.12 }}>
        <rect x="50" y="40" width="40" height="80" fill={BLUE} rx="2" />
        <rect x="100" y="20" width="30" height="100" fill={BLUE} rx="2" />
        <rect x="140" y="50" width="50" height="70" fill={BLUE} rx="2" />
        <rect x="220" y="30" width="35" height="90" fill={BLUE} rx="2" />
        <rect x="270" y="60" width="45" height="60" fill={BLUE} rx="2" />
        <rect x="900" y="35" width="40" height="85" fill={BLUE} rx="2" />
        <rect x="950" y="55" width="50" height="65" fill={BLUE} rx="2" />
        <rect x="1020" y="25" width="30" height="95" fill={BLUE} rx="2" />
        <rect x="1060" y="45" width="45" height="75" fill={BLUE} rx="2" />
        <rect x="1120" y="60" width="35" height="60" fill={BLUE} rx="2" />
      </svg>
      <h1 style={{ fontSize: 28, fontWeight: 800, color: GRAY_900, margin: "0 0 4px", fontFamily: "'Helvetica Neue', Helvetica, Arial, sans-serif" }}>
        Top-rated car insurance<br/>companies for ZIP {ZIP}
      </h1>
    </div>
  );
}

const AI_FLOW = [
  { reply: "Great! To match you with the best agent, are you currently insured?", quick: ["Yes", "No"] },
  { reply: "Got it. Who's your current carrier?", quick: ["Progressive", "GEICO", "State Farm", "Other"] },
  { reply: "And what do you drive? Year, make, and model is perfect.", quick: null },
  { reply: "Last thing — what's the best number to reach you? Your agent can call you directly.", quick: null },
  { reply: null, quick: null },
];

function ChatWidget() {
  const [messages, setMessages] = useState([
    { from: "ai", text: "Hi there! \u{1F44B} I'm Alex from CarInsurance.com." },
    { from: "ai", text: `I can connect you with a licensed agent in ${CITY} who can get you a personalized quote. Want to get started?` },
  ]);
  const [input, setInput] = useState("");
  const [step, setStep] = useState(0);
  const [typing, setTyping] = useState(false);
  const [quickReplies, setQuickReplies] = useState(["Yes, let's go!", "How does this work?"]);
  const [done, setDone] = useState(false);
  const endRef = useRef(null);

  useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, typing]);

  const pushAI = (text, quicks, delay = 1100) => {
    setTyping(true);
    setQuickReplies(null);
    setTimeout(() => {
      setTyping(false);
      setMessages(prev => [...prev, { from: "ai", text }]);
      if (quicks) setQuickReplies(quicks);
    }, delay);
  };

  const pushAIMulti = (texts, quicks, delay = 1100) => {
    setTyping(true);
    setQuickReplies(null);
    let d = delay;
    texts.forEach((text, i) => {
      const isLast = i === texts.length - 1;
      setTimeout(() => {
        setMessages(prev => [...prev, { from: "ai", text }]);
        if (isLast) {
          setTyping(false);
          if (quicks) setQuickReplies(quicks);
        }
      }, d);
      d += 1200;
    });
  };

  const handleSend = (text) => {
    if (!text.trim() || done) return;
    setMessages(prev => [...prev, { from: "user", text: text.trim() }]);
    setInput("");
    setQuickReplies(null);

    const s = step;
    setStep(s + 1);

    if (s === 0 && text.toLowerCase().includes("how")) {
      pushAI(
        "I'm an AI assistant \u2014 I'll ask a few quick questions, then connect you live with a licensed agent in your area. No forms, takes about 60 seconds. Ready?",
        ["Yes, let's go!"],
      );
      setStep(0);
      return;
    }

    if (s === AI_FLOW.length - 1) {
      setDone(true);
      pushAIMulti([
        `Perfect! I found 3 licensed agents in ${CITY} with competitive rates for your vehicle. \u{1F389}`,
        `Connecting you now with Agent Sarah M. \u2014 she specializes in saving drivers in your area an average of $47/mo. She'll have your info so you won't repeat anything. Hold tight!`,
      ], null, 1000);
      return;
    }

    if (s < AI_FLOW.length) {
      const next = AI_FLOW[s];
      pushAI(next.reply, next.quick);
    }
  };

  return (
    <div style={{
      border: `1px solid ${GRAY_200}`, borderRadius: 16, overflow: "hidden",
      boxShadow: "0 6px 32px rgba(0,0,0,0.08)", background: "white",
    }}>
      <div style={{
        background: BLUE, padding: "12px 18px",
        display: "flex", alignItems: "center", gap: 10,
      }}>
        <div style={{
          width: 9, height: 9, borderRadius: "50%", background: "#4ADE80",
          boxShadow: "0 0 6px #4ADE80",
        }} />
        <span style={{ color: "white", fontWeight: 600, fontSize: 14 }}>Chat with Alex — AI Agent</span>
        <span style={{ color: "rgba(255,255,255,0.55)", fontSize: 12, marginLeft: "auto" }}>Online now</span>
      </div>

      <div style={{
        height: 380, overflowY: "auto", padding: "14px 14px 6px",
        background: GRAY_50,
      }}>
        {messages.map((msg, i) => (
          <div key={i} style={{
            display: "flex", flexDirection: msg.from === "user" ? "row-reverse" : "row",
            gap: 8, marginBottom: 10, alignItems: "flex-end",
          }}>
            {msg.from === "ai" && <AgentDot />}
            <div style={{
              maxWidth: "80%", padding: "10px 14px",
              borderRadius: msg.from === "user" ? "14px 14px 4px 14px" : "14px 14px 14px 4px",
              background: msg.from === "user" ? BLUE : "white",
              color: msg.from === "user" ? "white" : GRAY_900,
              fontSize: 14, lineHeight: 1.5,
              boxShadow: msg.from === "user" ? "none" : "0 1px 3px rgba(0,0,0,0.05)",
              border: msg.from === "user" ? "none" : `1px solid ${GRAY_200}`,
            }}>
              {msg.text}
            </div>
          </div>
        ))}

        {typing && (
          <div style={{ display: "flex", gap: 8, marginBottom: 10, alignItems: "flex-end" }}>
            <AgentDot />
            <div style={{
              padding: "10px 14px", borderRadius: "14px 14px 14px 4px",
              background: "white", boxShadow: "0 1px 3px rgba(0,0,0,0.05)",
              border: `1px solid ${GRAY_200}`,
            }}><TypingDots /></div>
          </div>
        )}
        <div ref={endRef} />
      </div>

      {quickReplies && !typing && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8, padding: "6px 14px 10px", background: GRAY_50 }}>
          {quickReplies.map((opt, i) => (
            <button key={i} onClick={() => handleSend(opt)} style={{
              padding: "7px 16px", borderRadius: 20, border: `1.5px solid ${BLUE}`,
              background: "white", color: BLUE, fontSize: 13, fontWeight: 600,
              cursor: "pointer", transition: "all .12s",
            }}
              onMouseEnter={e => { e.target.style.background = BLUE; e.target.style.color = "white"; }}
              onMouseLeave={e => { e.target.style.background = "white"; e.target.style.color = BLUE; }}
            >{opt}</button>
          ))}
        </div>
      )}

      <div style={{
        display: "flex", alignItems: "center", gap: 8,
        padding: "10px 14px", borderTop: `1px solid ${GRAY_200}`, background: "white",
      }}>
        <input
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === "Enter" && handleSend(input)}
          placeholder={done ? "Agent connecting..." : "Type your message..."}
          disabled={done}
          style={{
            flex: 1, padding: "10px 14px", borderRadius: 24,
            border: `1.5px solid ${GRAY_200}`, fontSize: 14, outline: "none",
            transition: "border-color .15s", opacity: done ? 0.5 : 1,
          }}
          onFocus={e => e.target.style.borderColor = BLUE}
          onBlur={e => e.target.style.borderColor = GRAY_200}
        />
        <button onClick={() => handleSend(input)} disabled={done}
          style={{
            width: 40, height: 40, borderRadius: "50%", background: BLUE,
            border: "none", cursor: done ? "default" : "pointer",
            display: "flex", alignItems: "center", justifyContent: "center",
            flexShrink: 0, opacity: done ? 0.5 : 1,
          }}>
          <SendIcon />
        </button>
      </div>
    </div>
  );
}

  return (
    <div style={{ minHeight: "100vh", background: "white", color: GRAY_900 }}>
      {/* Header */}
      <header style={{

        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <path d="M14 2L4 7v7c0 7.18 4.28 13.9 10 16 5.72-2.1 10-8.82 10-16V7L14 2z" fill={BLUE} opacity="0.15" stroke={BLUE} strokeWidth="1.5" />
            <path d="M10 14l3 3 5-5" stroke={BLUE} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
          </svg>
          <span style={{ fontSize: 21, fontWeight: 700, color: GRAY_900, letterSpacing: -0.3 }}>
            Car<span style={{ fontWeight: 400 }}>Insurance</span><span style={{ fontSize: 13, color: GRAY_500 }}>.com</span>
          </span>
        </div>
        <a href={`tel:${PHONE_RAW}`} style={{
          display: "flex", alignItems: "center", gap: 6,
          color: BLUE, fontWeight: 700, fontSize: 14.5, textDecoration: "none",
        }}>
          <PhoneIcon size={16} color={BLUE} />
          Call an agent now: {PHONE_DISPLAY}
        </a>
      </header>

      {/* Banner */}
      <CityBanner />

      {/* Filter */}
      <div style={{ display: "flex", justifyContent: "center", padding: "16px 0 20px" }}>
        <button style={{
          display: "flex", alignItems: "center", gap: 6,
          padding: "8px 22px", borderRadius: 24,
          border: `1px solid ${GRAY_200}`, background: "white",
          color: BLUE, fontWeight: 600, fontSize: 14, cursor: "pointer",
          boxShadow: "0 1px 4px rgba(0,0,0,0.04)",
        }}>
          <FilterIcon /> Filter <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={BLUE} strokeWidth="2.5"><polyline points="6 9 12 15 18 9" /></svg>
        </button>
      </div>

      {/* Carrier Cards */}
      <div style={{ maxWidth: 780, margin: "0 auto", padding: "0 20px" }}>
        <p style={{ fontSize: 16, color: GRAY_700, marginBottom: 20 }}>
          <strong>Click on 2 or more</strong> insurers below to compare quotes and maximize your savings.
        </p>

        <CarrierCard starred name="Progressive" logo={<ProgressiveLogo />}
          headline="Drivers who save by switching to Progressive save $946 on average"
          bullets={[
            "Get a customized quote today and see if you could save",
            "Fast, easy and reliable claims service available 24 hours a day",
            "Trusted by millions of drivers to insure what's important",
          ]} />

        <CarrierCard name="Liberty Mutual" logo={<LibertyMutualLogo />}
          headline="See Why Michigan Drivers Could Save $700 With Liberty Mutual"
          bullets={[
            "Get Your Customized Quote Today",
            "Let Us See How Much We Could Save You!",
            "Only Pay For What You Need",
            "We Customize So You Could Save $700 On Car Insurance",
          ]} />

        <CarrierCard name="Allstate" logo={<AllstateLogo />}
          headline="Bundle home & auto and save up to 25% with Allstate"
          bullets={[
            "Get a free personalized quote in minutes",
            "24/7 claims support when you need it most",
            "Local agents who know your neighborhood",
          ]} />
      </div>

      {/* CTA Section */}
      <div style={{
        marginTop: 40, background: GRAY_50,
        borderTop: `1px solid ${GRAY_200}`, padding: "48px 20px 56px",
      }}>
        <div style={{ maxWidth: 780, margin: "0 auto" }}>
          <div style={{ textAlign: "center", marginBottom: 28 }}>
            <div style={{
              display: "inline-flex", alignItems: "center", gap: 6,
              background: "#FFFBEB", border: "1px solid #FDE68A",
              borderRadius: 20, padding: "5px 14px", marginBottom: 16,
              fontSize: 13, fontWeight: 600, color: "#92400E",
            }}>
              <BoltIcon size={14} /> Instant connection — no hold time
            </div>
            <h2 style={{
              fontSize: 28, fontWeight: 800, color: GRAY_900,
              margin: "0 0 8px", lineHeight: 1.25,
            }}>
              Talk to a licensed agent in {CITY} right now.
            </h2>
            <p style={{ fontSize: 15, color: GRAY_500, margin: 0 }}>
              Chat with our AI below or call directly — either way, you're connected in seconds.
            </p>
          </div>

          <div style={{ display: "flex", gap: 20, alignItems: "flex-start" }}>
            <div style={{ flex: "1 1 0", minWidth: 0 }}>
              <ChatWidget />
            </div>

            <div style={{ width: 240, flexShrink: 0 }}>
              <div style={{
                background: "white", borderRadius: 16,
                border: `1px solid ${GRAY_200}`, padding: "28px 20px",
                textAlign: "center",
                boxShadow: "0 4px 20px rgba(0,0,0,0.05)",
                position: "sticky", top: 80,
              }}>
                <div style={{
                  width: 52, height: 52, borderRadius: "50%", margin: "0 auto 14px",
                  background: "linear-gradient(135deg, #DBEAFE, #EFF6FF)",
                  display: "flex", alignItems: "center", justifyContent: "center",
                }}>
                  <PhoneIcon size={24} color={BLUE} />
                </div>

                <p style={{ fontSize: 15, fontWeight: 700, color: GRAY_900, margin: "0 0 4px" }}>
                  Prefer to talk?
                </p>
                <p style={{ fontSize: 13, color: GRAY_500, margin: "0 0 18px", lineHeight: 1.45 }}>
                  Our AI picks up instantly and transfers you to a live, licensed agent.
                </p>

                <a href={`tel:${PHONE_RAW}`} style={{
                  display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
                  padding: "14px 16px", background: BLUE, color: "white",
                  borderRadius: 12, fontWeight: 700, fontSize: 15,
                  textDecoration: "none", transition: "background .15s",
                  boxShadow: "0 3px 12px rgba(0,170,255,0.2)",
                }}>
                  <PhoneIcon size={18} color="white" />
                  Call Now
                </a>

                <p style={{ fontSize: 20, fontWeight: 800, color: GRAY_900, margin: "14px 0 0", letterSpacing: -0.3 }}>
                  {PHONE_DISPLAY}
                </p>
                <p style={{ fontSize: 11, color: GRAY_300, margin: "6px 0 0" }}>
                  Avg. transfer: 28 seconds
                </p>

                <div style={{ height: 1, background: GRAY_200, margin: "20px 0" }} />

                <div style={{ textAlign: "left" }}>
                  {[
                    { icon: "\u{1F512}", text: "Info never shared without your consent" },
                    { icon: "\u{1F4CD}", text: "Agents licensed in Michigan" },
                    { icon: "\u26A1", text: "Connected in under 30 sec" },
                  ].map((item, i) => (
                    <div key={i} style={{
                      display: "flex", gap: 8, alignItems: "flex-start",
                      marginBottom: i < 2 ? 10 : 0,
                    }}>
                      <span style={{ fontSize: 14, lineHeight: 1.4 }}>{item.icon}</span>
                      <span style={{ fontSize: 12, color: GRAY_500, lineHeight: 1.4 }}>{item.text}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
