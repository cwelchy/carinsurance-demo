<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Top Car Insurance Companies for ZIP 48167 | CarInsurance.com</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #111827; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const BLUE = "#00AAFF";
const BLUE_DARK = "#0088DD";
const GRAY_50 = "#F7F8FA";
const GRAY_100 = "#F0F1F3";
const GRAY_200 = "#E2E4E8";
const GRAY_300 = "#C8CCD2";
const GRAY_500 = "#6B7280";
const GRAY_700 = "#374151";
const GRAY_900 = "#111827";
const GREEN = "#22C55E";

const PHONE_DISPLAY = "1-888-918-0455";
const PHONE_RAW = "18889180455";
const ZIP = "48167";
const CITY = "Northville";

function PhoneIcon({ size = 20, color = "currentColor" }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z" />
    </svg>
  );
}

function MessageIcon({ size = 20, color = "currentColor" }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
    </svg>
  );
}

function StarIcon() {
  return (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="white" stroke="none">
      <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
    </svg>
  );
}

function ChevronRight() {
  return (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
      <polyline points="9 18 15 12 9 6" />
    </svg>
  );
}

function FilterIcon() {
  return (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={BLUE} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <line x1="4" y1="6" x2="20" y2="6" />
      <line x1="8" y1="12" x2="16" y2="12" />
      <line x1="11" y1="18" x2="13" y2="18" />
    </svg>
  );
}

function BoltIcon({ size = 18 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="#FACC15" stroke="#FACC15" strokeWidth="1">
      <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
    </svg>
  );
}

function CarrierCard({ name, logo, headline, bullets, starred, delay }) {
  const [h, setH] = useState(false);
  return (
    <div onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
      style={{
        position: "relative", display: "flex", alignItems: "center", gap: 20,
        padding: "24px 28px", background: "white",
        border: `1px solid ${h ? BLUE : GRAY_200}`, borderRadius: 12, marginBottom: 16,
        transition: "border-color .15s, box-shadow .15s", cursor: "pointer",
        boxShadow: h ? "0 4px 20px rgba(0,170,255,0.08)" : "0 1px 4px rgba(0,0,0,0.04)",
        animation: `fadeUp 0.4s ease ${delay}s both`,
      }}>
      {starred && (
        <div style={{
          position: "absolute", top: -1, left: -1, background: BLUE,
          borderRadius: "12px 0 8px 0", padding: "6px 8px", display: "flex", alignItems: "center",
        }}><StarIcon /></div>
      )}
      <div style={{ width: 150, minWidth: 150, display: "flex", alignItems: "center", justifyContent: "center" }}>
        {logo}
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <p style={{ color: BLUE, fontWeight: 700, fontSize: 16, margin: "0 0 8px", lineHeight: 1.3 }}>{headline}</p>
        <ul style={{ margin: 0, paddingLeft: 18, listStyle: "disc" }}>
          {bullets.map((b, i) => (
            <li key={i} style={{ fontSize: 13.5, color: GRAY_700, marginBottom: 3, lineHeight: 1.4 }}>{b}</li>
          ))}
        </ul>
      </div>
      <button style={{
        padding: "14px 32px", background: h ? BLUE_DARK : BLUE, color: "white", border: "none", borderRadius: 8,
        fontWeight: 700, fontSize: 16, cursor: "pointer", whiteSpace: "nowrap",
        display: "flex", alignItems: "center", gap: 4, transition: "background .15s",
      }}>See Rate <ChevronRight /></button>
    </div>
  );
}

function ProgressiveLogo() {
  return (<div style={{ textAlign: "center" }}>
    <div style={{ fontWeight: 900, fontSize: 22, color: "#004B8D", fontStyle: "italic", letterSpacing: -0.5, fontFamily: "Georgia, serif" }}>PROGRESSIVE</div>
  </div>);
}
function LibertyMutualLogo() {
  return (<div style={{ textAlign: "center" }}>
    <div style={{ fontWeight: 800, fontSize: 18, color: "#1A1A5E", lineHeight: 1.1, fontFamily: "Georgia, serif" }}>Liberty<br/>Mutual.</div>
    <div style={{ fontSize: 8, fontWeight: 600, color: "#B8860B", letterSpacing: 2, marginTop: 2 }}>INSURANCE</div>
  </div>);
}
function AllstateLogo() {
  return (<div style={{ textAlign: "center" }}>
    <div style={{ fontWeight: 800, fontSize: 20, color: "#003DA5", fontFamily: "Georgia, serif" }}>Allstate</div>
    <div style={{ fontSize: 9, color: GRAY_500, marginTop: 1 }}>You're in good hands.&reg;</div>
  </div>);
}

function CityBanner() {
  return (
    <div style={{ position: "relative", background: "linear-gradient(180deg, #F0F9FF 0%, white 100%)", padding: "48px 0 24px", textAlign: "center", overflow: "hidden" }}>
      <svg width="100%" height="120" viewBox="0 0 1200 120" preserveAspectRatio="xMidYMax meet" style={{ position: "absolute", bottom: 0, left: 0, right: 0, opacity: 0.12 }}>
        <rect x="50" y="40" width="40" height="80" fill={BLUE} rx="2" />
        <rect x="100" y="20" width="30" height="100" fill={BLUE} rx="2" />
        <rect x="140" y="50" width="50" height="70" fill={BLUE} rx="2" />
        <rect x="220" y="30" width="35" height="90" fill={BLUE} rx="2" />
        <rect x="270" y="60" width="45" height="60" fill={BLUE} rx="2" />
        <rect x="900" y="35" width="40" height="85" fill={BLUE} rx="2" />
        <rect x="950" y="55" width="50" height="65" fill={BLUE} rx="2" />
        <rect x="1020" y="25" width="30" height="95" fill={BLUE} rx="2" />
        <rect x="1060" y="45" width="45" height="75" fill={BLUE} rx="2" />
        <rect x="1120" y="60" width="35" height="60" fill={BLUE} rx="2" />
      </svg>
      <h1 style={{ fontSize: 28, fontWeight: 800, color: GRAY_900, margin: "0 0 4px", fontFamily: "'Helvetica Neue', Helvetica, Arial, sans-serif" }}>
        Top-rated car insurance<br/>companies for ZIP {ZIP}
      </h1>
    </div>
  );
}

        display: "flex", alignItems: "center", justifyContent: "space-between",

      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <path d="M14 2L4 7v7c0 7.18 4.28 13.9 10 16 5.72-2.1 10-8.82 10-16V7L14 2z" fill={BLUE} opacity="0.15" stroke={BLUE} strokeWidth="1.5" />
            <path d="M10 14l3 3 5-5" stroke={BLUE} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
          </svg>
          <span style={{ fontSize: 21, fontWeight: 700, color: GRAY_900, letterSpacing: -0.3 }}>
            Car<span style={{ fontWeight: 400 }}>Insurance</span><span style={{ fontSize: 13, color: GRAY_500 }}>.com</span>
          </span>
        </div>
        <a href={`tel:${PHONE_RAW}`} style={{
          display: "flex", alignItems: "center", gap: 6,
          color: BLUE, fontWeight: 700, fontSize: 14.5, textDecoration: "none",
        }}>
          <PhoneIcon size={16} color={BLUE} />
          Call an agent now: {PHONE_DISPLAY}
        </a>
      </header>

      {/* Banner */}
      <CityBanner />

      {/* Filter */}
      <div style={{ display: "flex", justifyContent: "center", padding: "16px 0 20px" }}>
        <button style={{
          display: "flex", alignItems: "center", gap: 6,
          padding: "8px 22px", borderRadius: 24,
          border: `1px solid ${GRAY_200}`, background: "white",
          color: BLUE, fontWeight: 600, fontSize: 14, cursor: "pointer",
          boxShadow: "0 1px 4px rgba(0,0,0,0.04)",
        }}>
          <FilterIcon /> Filter <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={BLUE} strokeWidth="2.5"><polyline points="6 9 12 15 18 9" /></svg>
        </button>
      </div>

      {/* Carrier Cards */}
      <div style={{ maxWidth: 780, margin: "0 auto", padding: "0 20px" }}>
        <p style={{ fontSize: 16, color: GRAY_700, marginBottom: 20 }}>
          <strong>Click on 2 or more</strong> insurers below to compare quotes and maximize your savings.
        </p>

        <CarrierCard starred name="Progressive" logo={<ProgressiveLogo />}

          bullets={[
            "Get a customized quote today and see if you could save",
            "Fast, easy and reliable claims service available 24 hours a day",
            "Trusted by millions of drivers to insure what's important",
          ]} delay={0.05} />

        <CarrierCard name="Liberty Mutual" logo={<LibertyMutualLogo />}
          headline="See Why Michigan Drivers Could Save $700 With Liberty Mutual"
          bullets={[
            "Get Your Customized Quote Today",
            "Let Us See How Much We Could Save You!",
            "Only Pay For What You Need",
            "We Customize So You Could Save $700 On Car Insurance",
          ]} delay={0.1} />

        <CarrierCard name="Allstate" logo={<AllstateLogo />}
          headline="Bundle home & auto and save up to 25% with Allstate"
          bullets={[
            "Get a free personalized quote in minutes",
            "24/7 claims support when you need it most",
            "Local agents who know your neighborhood",
          ]} delay={0.15} />
      </div>

      {/* ═══════════════════════════════════════════
          CTA SECTION: Call or Text
          ═══════════════════════════════════════════ */}
      <div style={{
        marginTop: 40, background: GRAY_50,
        borderTop: `1px solid ${GRAY_200}`, padding: "48px 20px 56px",
      }}>
        <div style={{ maxWidth: 540, margin: "0 auto" }}>
          <div style={{
            background: "white", borderRadius: 20,
            border: `1px solid ${GRAY_200}`, padding: "40px 36px",
            textAlign: "center",
            boxShadow: "0 6px 32px rgba(0,0,0,0.06)",
          }}>
            {/* Badge */}
            <div style={{
              display: "inline-flex", alignItems: "center", gap: 6,
              background: "#FFFBEB", border: "1px solid #FDE68A",
              borderRadius: 20, padding: "5px 14px", marginBottom: 20,
              fontSize: 13, fontWeight: 600, color: "#92400E",
            }}>
              <BoltIcon size={14} /> Instant connection &mdash; no hold time
            </div>

            {/* Title */}
            <h2 style={{
              fontSize: 26, fontWeight: 800, color: GRAY_900,
              margin: "0 0 8px", lineHeight: 1.25,
            }}>
              Talk to a licensed agent in<br/>{CITY} right now.
            </h2>
            <p style={{ fontSize: 15, color: GRAY_500, margin: "0 0 28px", lineHeight: 1.5 }}>
              Call or text our AI agent &mdash; it answers instantly,<br/>
              qualifies your needs, and connects you live.
            </p>

            {/* Phone number */}
            <div style={{
              fontSize: 32, fontWeight: 800, color: GRAY_900,
              letterSpacing: -0.5, marginBottom: 24,
            }}>
              {PHONE_DISPLAY}
            </div>

            {/* Buttons */}
            <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
              <a href={`tel:${PHONE_RAW}`} style={{
                flex: "1 1 0", maxWidth: 220,
                display: "flex", alignItems: "center", justifyContent: "center", gap: 10,
                padding: "16px 20px", background: BLUE, color: "white",
                borderRadius: 12, fontWeight: 700, fontSize: 16,
                textDecoration: "none", transition: "background .15s, transform .1s",
                boxShadow: "0 3px 12px rgba(0,170,255,0.25)",
              }}
                onMouseEnter={e => { e.currentTarget.style.background = BLUE_DARK; e.currentTarget.style.transform = "translateY(-1px)"; }}
                onMouseLeave={e => { e.currentTarget.style.background = BLUE; e.currentTarget.style.transform = "translateY(0)"; }}
              >
                <PhoneIcon size={20} color="white" />
                Call Now
              </a>

              <a href={`sms:${PHONE_RAW}&body=Hi%2C%20I%27m%20looking%20for%20car%20insurance%20in%20${ZIP}`} style={{
                flex: "1 1 0", maxWidth: 220,
                display: "flex", alignItems: "center", justifyContent: "center", gap: 10,
                padding: "16px 20px", background: GREEN, color: "white",
                borderRadius: 12, fontWeight: 700, fontSize: 16,
                textDecoration: "none", transition: "background .15s, transform .1s",
                boxShadow: "0 3px 12px rgba(34,197,94,0.25)",
              }}
                onMouseEnter={e => { e.currentTarget.style.background = "#16A34A"; e.currentTarget.style.transform = "translateY(-1px)"; }}
                onMouseLeave={e => { e.currentTarget.style.background = GREEN; e.currentTarget.style.transform = "translateY(0)"; }}
              >
                <MessageIcon size={20} color="white" />
                Text Now
              </a>
            </div>

            {/* Subtext */}
            <p style={{ fontSize: 13, color: GRAY_300, margin: "16px 0 0" }}>

          {/* Trust badges */}
          <div style={{
            display: "flex", alignItems: "center", justifyContent: "center",
            gap: 14, marginTop: 24, flexWrap: "wrap",
          }}>
            {[
              "\u{1F512} Info never shared without consent",
              "\u{1F4CD} Licensed agents in Michigan",
              "\u26A1 Connected in under 30 seconds",
            ].map((t, i) => (
              <span key={i} style={{
                fontSize: 12, color: GRAY_500, background: "white",
                padding: "5px 12px", borderRadius: 20,
                border: `1px solid ${GRAY_100}`,
              }}>
                {t}
              </span>
            ))}
          </div>
        </div>
      </div>

      {/* Footer */}
      <footer style={{
        padding: "24px 28px", borderTop: `1px solid ${GRAY_200}`,
        textAlign: "center", fontSize: 12, color: GRAY_300,
      }}>
        &copy; 2026 CarInsurance.com &mdash; A QuinStreet Company &middot; Privacy &middot; Terms
      </footer>

  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
